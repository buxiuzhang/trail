<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trail · 卷 二</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..900,0..100,0..1;1,9..144,300..900,0..100,0..1&family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=JetBrains+Mono:ital,wght@0,300..700;1,300..700&family=Noto+Serif+SC:wght@300..700&family=Noto+Sans+SC:wght@300..700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css?v=12" />
</head>
<body>
  <!-- 纸面颗粒 -->
  <div class="grain" aria-hidden="true"></div>

  <!-- 报头 / Masthead -->
  <header class="masthead">
    <div class="masthead__left">
      <div class="masthead__crest">
        <svg viewBox="0 0 60 60" width="44" height="44" aria-hidden="true">
          <circle cx="30" cy="30" r="28" fill="none" stroke="currentColor" stroke-width="0.8"/>
          <circle cx="30" cy="30" r="22" fill="none" stroke="currentColor" stroke-width="0.4"/>
          <path d="M14 30 L46 30 M30 14 L30 46" stroke="currentColor" stroke-width="0.5"/>
          <text x="30" y="34" text-anchor="middle" font-family="Fraunces" font-size="14" font-weight="500" fill="currentColor">T</text>
        </svg>
      </div>
      <div class="masthead__text">
        <h1 class="masthead__title">Trail</h1>
        <p class="masthead__subtitle">
          <span class="zh">个人编年</span>
          <span class="dot">·</span>
          <span class="en">A Personal Chronicle</span>
          <span class="dot">·</span>
          <span class="vol">卷 二 / Vol. II</span>
        </p>
      </div>
    </div>
    <div class="masthead__right">
      <div class="masthead__meta" id="meta-today">
        <span class="meta-label">TODAY</span>
        <span class="meta-value" id="meta-today-date">2026 · 06 · 07</span>
        <span class="meta-sep">·</span>
        <span class="meta-label">自上次记录</span>
        <span class="meta-value" id="meta-idle">— 天</span>
      </div>
      <button class="btn btn--primary" id="btn-new" type="button">
        <span class="btn-glyph">+</span>
        <span>新建条目</span>
      </button>
    </div>
  </header>

  <!-- 主体：左侧查找助手 + 右侧主区 -->
  <div class="shell">
    <aside class="sidebar" aria-label="查找助手">
      <section class="side-block">
        <h2 class="side-title">按状态</h2>
        <ul class="filter-list" id="filter-status" role="list">
          <!-- JS 注入 -->
        </ul>
      </section>

      <section class="side-block">
        <h2 class="side-title">按性质</h2>
        <ul class="filter-list" id="filter-nature" role="list">
          <!-- JS 注入 -->
        </ul>
      </section>

      <section class="side-block">
        <h2 class="side-title">按标签</h2>
        <ul class="filter-list" id="filter-tag" role="list">
          <!-- JS 注入 -->
        </ul>
      </section>

      <section class="side-block">
        <h2 class="side-title">编年</h2>
        <ul class="filter-list" id="filter-archive" role="list">
          <!-- JS 注入 -->
        </ul>
      </section>

      <div class="side-foot">
        <div class="side-foot__rule"></div>
        <p class="side-foot__note">
          凡录入者，皆为正典。<br/>
          凡未录者，皆为虚构。
        </p>
        <p class="side-foot__sig">— 自 2025</p>
      </div>
    </aside>

    <main class="main" id="main">
      <!-- 内容由 JS 渲染 -->
    </main>
  </div>

  <!-- 印章落版：状态变更 / 维护询问 / 删除确认 -->
  <div class="modal-shroud" id="modal" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal__hd">
        <span class="modal__eyebrow" id="modal-eyebrow">询问</span>
        <h3 class="modal__title" id="modal-title">标题</h3>
        <button class="modal__close" type="button" id="modal-close" aria-label="关闭">×</button>
      </div>
      <div class="modal__bd" id="modal-body">
        <!-- 内容 -->
      </div>
      <div class="modal__ft" id="modal-foot">
        <!-- 按钮 -->
      </div>
    </div>
  </div>

  <script src="app.js?v=12"></script>
</body>
</html>
