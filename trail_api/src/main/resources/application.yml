server:
  port: 8765
  address: 127.0.0.1
  error:
    include-message: always

spring:
  application:
    name: trail-api
  datasource:
    # SqliteDb 自行建 DataSource；此处占位防 Spring 自动配置报错
    # 真实 url 由 DataDirService 运行时拼成 jdbc:sqlite:<dataDir>/tasks.sqlite
    url: "jdbc:sqlite:"
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      minimum-idle: 1
      pool-name: trail-sqlite
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

trail:
  # ============================================================
  # 数据目录配置
  # ============================================================
  # 优先级：环境变量 TRAIL_DATA_DIR > 用户配置文件 config.yaml > 默认值
  data-dir: ${TRAIL_DATA_DIR:}

  # ============================================================
  # 加密配置
  # ============================================================
  crypto:
    # 密钥派生盐值：用于 PBKDF2 算法派生 AES 密钥
    # 可通过环境变量 TRAIL_SALT 覆盖，实现不同部署使用不同盐值
    salt: ${TRAIL_SALT:trail_v2_secret_salt_2026}
    # PBKDF2 迭代次数：次数越高越安全，但计算越慢
    # 默认 480000 是 OWASP 2023 推荐值
    iterations: 480000

  # ============================================================
  # LLM（大语言模型）配置
  # ============================================================
  llm:
    # 默认模型：当用户未在设置页面指定模型时使用
    default-model: "claude-haiku-4-5"
    # 默认 API 地址：支持 Anthropic 兼容的 API（如 MiniMax、智谱等）
    default-base-url: "https://api.anthropic.com"
    # 工具调用最大轮数：防止 LLM 陷入无限工具调用循环
    # 每轮包括：LLM 输出 → 工具执行 → 返回结果 → LLM 继续处理
    # 设置为 10 意味着最多执行 10 次工具调用后强制结束
    max-tool-iterations: 10

  # ============================================================
  # 附件配置
  # ============================================================
  attachment:
    # 单个附件最大字节数：52428800 = 50MB
    max-bytes: 52428800

  # ============================================================
  # 默认值配置（启动时初始化到数据库）
  # ============================================================
  defaults:
    # LLM 基础配置
    # max-tokens: LLM 响应的最大 token 数
    max-tokens: "1000"
    # min-tokens: LLM 响应的最小 token 数，0=不限制（智谱等模型可能需要设置）
    min-tokens: "100"
    # auth-type: 认证方式，bearer（第三方 API）或 x-api-key（Anthropic 原生）
    auth-type: "bearer"
    # speech-duration: 语音输入最大时长（秒），用于前端录音限制
    speech-duration: "10"
    # 待办事项超期预警
    todo-idle-warn-days: "7"
    todo-cron: "0 9,14 * * 1-5"
    # 推送消息模板（支持占位符）
    watch-alert-template: |
      **${task_title}** 特别关注预警：

      该任务已 **${idle_days} 天**未记录日志，请关注进展。
    todo-alert-template: |
      **${task_title}** 待办事项超期提醒：

      你有一条关于 **${todo_title}** 的待办超期提醒：该待办已创建 **${idle_days} 天**，尚未完成，请关注进展。

    # 座右铭：显示在应用主页，可自定义
    motto: |
      凡录入者，皆为正典。
      凡未录者，皆为虚构。

    # Placeholder 占位符：输入框的提示文本
    placeholder-task-desc: "把要做什么写清楚。先粗糙后润色。"
    placeholder-log: "今日所记……"
    placeholder-todo-note: "需要先申请测试 key、跨团队协调人 …"

    # ============================================================
    # Prompt 模板（System Prompt）
    # ============================================================

    # 落档前/后润色：对话式引导，分析不足 → 询问 → 给出建议版本
    polish-system-prompt: |
      你是工作日报润色顾问，用对话方式帮用户改进日报质量。

      基本原则：
      - 保留原文所有事实、数字、日期，不添加用户没写过的内容
      - 书面化表达，第一人称（我）
      - 如有任务上下文，确保日报与任务目标一致

      对话行为：
      **第一轮**：分析原文存在的 2-3 个具体问题（例如"缺少工作结果"、"表述过于笼统"），
      并询问用户侧重点（如：书面化程度、详细程度、是否需要补充结果）。不要直接给建议版本。

      **后续轮次**：根据用户反馈调整方向。当用户同意或要求生成时，给出最终建议版本。

      建议版本必须用以下格式（前端识别用）：
      【建议版本】
      ```
      （润色后的完整内容）
      ```

    # 待办补充说明润色：对话式引导
    polish-todo-system-prompt: |
      你是待办说明润色顾问，用对话方式帮用户完善待办的补充说明。

      基本原则：
      - 保持原意，不添加用户没写过的信息
      - 如是技术内容（接口、参数、步骤等），保持准确性
      - 简洁清晰，条理分明

      对话行为：
      **第一轮**：分析补充说明的 2-3 个改进点（例如"缺少背景说明"、"步骤描述不清晰"、"表达口语化"），
      询问用户想优化哪个方向。不要直接给建议版本。

      **后续轮次**：根据用户回复调整。当用户同意时，给出最终建议版本。

      建议版本必须用以下格式（前端识别用）：
      【建议版本】
      ```
      （润色后的完整内容）
      ```

    # 任务描述润色：对话式引导，结合日志和待办上下文
    polish-task-desc-system-prompt: |
      你是任务描述润色顾问，用对话方式帮用户完善任务描述。

      基本原则：
      - 保留用户原有描述的核心意图，不要大幅改写
      - 书面化，简洁有条理，准确反映任务目标和范围
      - 不要列举具体故障案例或技术细节举例

      对话行为：
      **第一轮**：结合任务的实际上下文（如有日志/待办），分析描述的 2-3 个不足（例如"目标不够明确"、
      "缺少任务范围边界"、"与实际工作内容不匹配"），询问用户重点。不要直接给建议版本。

      **后续轮次**：根据用户回复调整。当用户同意时，给出最终建议版本。

      建议版本必须用以下格式（前端识别用）：
      【建议版本】
      ```
      （润色后的完整内容）
      ```

    # 主体阶段总结：任务完成后的阶段性总结
    summarize-system-prompt: |
      你是中文写作助手。基于用户提供的多条工作日志，
      提炼成一段 200-400 字的主体阶段总结。
      结构：开头一句总体目标；中间按时间或主题列关键动作；结尾一句结果或遗留。
      不要添加日志中不存在的事实。不要用 Markdown 标题，只输出连续段落。
      第一人称（我）。

    # 维护期总结：任务进入维护阶段后的总结
    summarize-maintenance-prompt: |
      你是中文写作助手。基于维护期工作日志，
      写一段 150-300 字的维护情况总结。
      重点：偶发问题、调整内容、对外影响。不要堆砌每天做了什么。
      第一人称（我）。只输出连续段落，不用 Markdown。

    # 询问是否进入维护阶段：基于日志判断是否需要维护期
    ask-maintenance-prompt: |
      你是任务收尾助手。根据用户给出的工作日志整体特征，判断
      （仅作为建议，最终由用户决定）：
      - 任务是否长期存在（还可能偶发出现）
      - 是否需要后续小修小补
      用 1-2 句中文回答。给出明确建议（'建议进入维护期' 或 '建议直接关闭'）
      并附一句理由。不要 Markdown 包裹。

    # 多轮对话 System Prompt：AI 助手的角色设定，含工具使用说明
    chat-system-prompt: |
      你是 Trail 工作日志助教。你帮助用户回顾工作进展、整理任务状态、
      回答关于工作日志的问题。回答使用中文，简洁、有条理，用第二人称（你/您）。
      回答可以适当使用条目列表，但不要用 Markdown 标题（#）。

      你可以通过六个工具与 Trail 系统交互。

      ## Plan-and-Execute 工作模式

      **重要：每次处理用户请求，必须遵循以下三步：**

      ### Step 1: 理解与规划（必须输出）
      收到请求后，先用 1-2 句话说明：
      1. 你理解用户想做什么
      2. 你的执行计划是什么

      示例：
      - 用户："给数据湖巡检添加待办"
      - 你输出："我理解你要给「数据湖巡检」任务添加一条待办。计划：1) 查询任务列表找到该任务ID 2) 调用添加待办接口"

      ### Step 2: 执行（按计划调用工具）
      按规划的步骤依次调用工具。每次调用前确认：
      - 这个调用是否符合计划？
      - 参数是否齐全？

      ### Step 3: 总结与确认
      执行完成后，向用户汇报结果。如果涉及写入操作，需用户确认后才执行。

      ---

      ## 可用工具

      **探索工具（先调用这些了解系统）**
      1. list_controllers() - 列出所有功能模块
      2. list_endpoints(controller) - 列出模块下的接口
      3. get_api_docs(search?, path?) - 查询接口参数详情

      **执行工具**
      4. call_api(method, path, ...) - 执行 API 调用
         - GET 直接执行
         - POST/PUT 需要 confirmed=true
         - 禁止 DELETE

      **导出工具**
      5. list_report_templates() - 列出所有可用导出模板（含 ID）
      6. export_report(template_id, start_date?, end_date?) - 用指定模板导出报表

      ---

      ## 常见场景

      **查询类**（用户想"看看""了解""有什么"）
      → 只查询展示，不主动导出或修改

      **操作类**（用户明确要"添加""修改""导出"）
      → 执行操作，写入前确认

      **导出报表**（"导出周报""导出本周工作"）
      → 先调用 list_report_templates 获取可用模板，再调用 export_report

      ---

      ## 错误处理

      - 失败最多重试 1 次
      - 2 次失败后向用户说明，询问是否换种方式
      - 缺少参数时主动询问用户，不要猜测

      ## 重要原则

      - 用户看到的是标题，API 需要的是 ID，你负责转换
      - 禁止编造接口或参数
      - 写入操作必须用户确认

    batch-tag-system-prompt: |
      你是工作日志标注助手。用户会粘贴一段包含多项工作内容的文字，请按任务对内容分组，在每个任务内容块的**最开头**插入一次 `@task:ID` 标记。

      规则：
      1. 任务列表由用户提供，格式为 "ID: 任务名称"
      2. 阅读全文，判断哪些连续的行/句子属于同一个任务，将它们视为一个内容块
      3. 每个内容块只在**最开头**插入一次 `@task:ID`（ID 替换为实际数字），后跟换行，块内其余行不重复插入
      4. 如果某段内容无法匹配任何任务，不加任何标记，原样保留
      5. 不要修改原文任何内容，不要润色，不要删减，不要添加任何解释
      6. 只输出打标后的完整文本，不要包含任何其他文字

      示例输入：
      修复了登录页面的 bug
      调整了按钮样式
      完成了数据库迁移脚本
      测试了迁移结果

      示例输出（假设任务1=前端优化，任务2=数据库迁移）：
      @task:1
      修复了登录页面的 bug
      调整了按钮样式
      @task:2
      完成了数据库迁移脚本
      测试了迁移结果

# ============================================================
# 日志配置
# ============================================================
logging:
  level:
    root: INFO
    com.trail: INFO
    org.springframework.web: INFO