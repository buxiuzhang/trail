server:
  port: 8765
  error:
    include-message: always

spring:
  application:
    name: trail-api
  datasource:
    # SqliteDb 自行建 DataSource；此处占位防 Spring 自动配置报错
    # 真实 url 由 DataDirService 运行时拼成 jdbc:sqlite:<dataDir>/tasks.sqlite
    url: "jdbc:sqlite:"
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      minimum-idle: 1
      pool-name: trail-sqlite
  servlet:
    multipart:
      enabled: true
      # M10：描述位截图粘贴。10MB 单图上限；前端不需切片
      max-file-size: 10MB
      max-request-size: 10MB

trail:
  # ============================================================
  # 数据目录配置
  # ============================================================
  # 优先级：环境变量 TRAIL_DATA_DIR > 用户配置文件 config.yaml > 默认值
  data-dir: ${TRAIL_DATA_DIR:}

  # ============================================================
  # 加密配置
  # ============================================================
  crypto:
    # 密钥派生盐值：用于 PBKDF2 算法派生 AES 密钥
    # 可通过环境变量 TRAIL_SALT 覆盖，实现不同部署使用不同盐值
    salt: ${TRAIL_SALT:trail_v2_secret_salt_2026}
    # PBKDF2 迭代次数：次数越高越安全，但计算越慢
    # 默认 480000 是 OWASP 2023 推荐值
    iterations: 480000

  # ============================================================
  # LLM（大语言模型）配置
  # ============================================================
  llm:
    # 默认模型：当用户未在设置页面指定模型时使用
    default-model: "claude-haiku-4-5"
    # 默认 API 地址：支持 Anthropic 兼容的 API（如 MiniMax、智谱等）
    default-base-url: "https://api.anthropic.com"
    # 工具调用最大轮数：防止 LLM 陷入无限工具调用循环
    # 每轮包括：LLM 输出 → 工具执行 → 返回结果 → LLM 继续处理
    # 设置为 10 意味着最多执行 10 次工具调用后强制结束
    max-tool-iterations: 10

  # ============================================================
  # 附件配置
  # ============================================================
  attachment:
    # 单个附件最大字节数：10485760 = 10MB
    # 超过此大小的图片将被拒绝上传
    max-bytes: 10485760

  # ============================================================
  # 默认值配置（启动时初始化到数据库）
  # ============================================================
  defaults:
    # LLM 基础配置
    # max-tokens: LLM 响应的最大 token 数
    max-tokens: "1000"
    # min-tokens: LLM 响应的最小 token 数，0=不限制（智谱等模型可能需要设置）
    min-tokens: "100"
    # auth-type: 认证方式，bearer（第三方 API）或 x-api-key（Anthropic 原生）
    auth-type: "bearer"
    # speech-duration: 语音输入最大时长（秒），用于前端录音限制
    speech-duration: "10"

    # 座右铭：显示在应用主页，可自定义
    motto: |
      凡录入者，皆为正典。
      凡未录者，皆为虚构。

    # Placeholder 占位符：输入框的提示文本
    placeholder-task-desc: "把要做什么写清楚。先粗糙后润色。"
    placeholder-log: "今日所记……"
    placeholder-todo-note: "需要先申请测试 key、跨团队协调人 …"

    # ============================================================
    # Prompt 模板（System Prompt）
    # ============================================================

    # 落档前/后润色：将口语化日志改写为书面化
    polish-system-prompt: |
      你是中文文本润色助手。把用户给的工作日志原文化、书面化，
      保留原意和事实细节，不要添加用户没写过的信息，不要改日期和数字。
      用第一人称（我）。如果原文没有标点，末尾补全句号。
      只输出润色后的纯文本，不要任何解释、Markdown 包裹、前后缀。

    # 待办补充说明润色
    polish-todo-system-prompt: |
      你是中文文本润色助手。把用户给的待办事项补充说明润色为清晰、简洁的描述。
      保持原意，不要添加用户没写过的信息。
      可以适当调整语序、补充标点，使表达更流畅。
      如果是技术内容（接口、参数、步骤等），保持准确性。
      只输出润色后的纯文本，不要任何解释、Markdown 包裹、前后缀。

    # 主体阶段总结：任务完成后的阶段性总结
    summarize-system-prompt: |
      你是中文写作助手。基于用户提供的多条工作日志，
      提炼成一段 200-400 字的主体阶段总结。
      结构：开头一句总体目标；中间按时间或主题列关键动作；结尾一句结果或遗留。
      不要添加日志中不存在的事实。不要用 Markdown 标题，只输出连续段落。
      第一人称（我）。

    # 维护期总结：任务进入维护阶段后的总结
    summarize-maintenance-prompt: |
      你是中文写作助手。基于维护期工作日志，
      写一段 150-300 字的维护情况总结。
      重点：偶发问题、调整内容、对外影响。不要堆砌每天做了什么。
      第一人称（我）。只输出连续段落，不用 Markdown。

    # 询问是否进入维护阶段：基于日志判断是否需要维护期
    ask-maintenance-prompt: |
      你是任务收尾助手。根据用户给出的工作日志整体特征，判断
      （仅作为建议，最终由用户决定）：
      - 任务是否长期存在（还可能偶发出现）
      - 是否需要后续小修小补
      用 1-2 句中文回答。给出明确建议（'建议进入维护期' 或 '建议直接关闭'）
      并附一句理由。不要 Markdown 包裹。

    # 多轮对话 System Prompt：AI 助手的角色设定
    # {tools_desc} 占位符会被工具使用说明替换
    chat-system-prompt: |
      你是 Trail 工作日志助教。你帮助用户回顾工作进展、整理任务状态、
      回答关于工作日志的问题。回答使用中文，简洁、有条理，用第二人称（你/您）。
      回答可以适当使用条目列表，但不要用 Markdown 标题（#）。

      {tools_desc}

    # 工具使用说明：注入到 chat-system-prompt 中
    tools-desc: |
      你可以通过六个工具与 Trail 系统交互：

      **渐进式披露（推荐流程）**
      1. list_controllers() - 列出所有功能模块（Controller）
         - 不确定有哪些功能时先调用，了解系统全貌
         - 返回模块名称、描述、接口数量

      2. list_endpoints(controller) - 列出指定模块的所有接口
         - 已确定模块后，查看具体有哪些操作
         - 参数：controller 为模块名称（如"工作日志"、"待办事项"）

      3. get_api_docs(search?, path?) - 查询具体接口的参数详情
         - 已确定接口后，查看参数定义
         - path 参数获取接口详情，search 参数搜索接口

      4. call_api(method, path, ...) - 执行 API 调用
         - GET 请求直接执行
         - POST/PUT 需要 confirmed=true 才能执行
         - 禁止执行 DELETE 请求

      5. export_daily_report(date?) - 导出今日工作日报

      6. export_weekly_report(start_date?, end_date?) - 导出本周工作周报

      **推荐流程**
      - 不熟悉系统：list_controllers → list_endpoints → get_api_docs → call_api
      - 熟悉系统：直接用 get_api_docs 搜索或 call_api 执行

      **时间相关查询**
      - 用户说"今日工作"、"今天做了什么" → 直接调用 export_daily_report
      - 用户说"本周工作"、"这周做了什么" → 直接调用 export_weekly_report

      **重要原则**
      - 用户看到的是标题，API 需要的是 ID，你负责转换
      - 禁止编造接口或参数
      - 写入操作必须用户确认

    # 日报/周报模板：导出时使用
    daily-report-template: |
      # 今日工作日报

      ## 工作内容
      [按任务列出今日完成的工作]

      ## 明日计划
      [待办事项或下一步计划]

      ## 备注
      [需要说明的事项]

    weekly-report-template: |
      # 本周工作周报

      ## 本周完成
      [按任务列出本周完成的工作]

      ## 进行中
      [正在进行的工作及进度]

      ## 下周计划
      [下周重点工作安排]

      ## 备注
      [需要说明的事项]

# ============================================================
# 日志配置
# ============================================================
logging:
  level:
    root: INFO
    com.trail: INFO
    org.springframework.web: INFO