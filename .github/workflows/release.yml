name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 0.3.0)'
        required: false
        default: '0.3.0'

permissions:
  contents: write

jobs:
  # ============================================================
  # 构建 Windows 安装包
  # ============================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Build Frontend
        run: |
          cd trail_web
          pnpm install
          pnpm build

      - name: Build Backend
        run: |
          cd trail_api
          mvn clean package -DskipTests

      - name: Prepare Bundle
        run: |
          mkdir bundle
          copy trail_api\target\trail-api.jar bundle\
          mkdir bundle\static
          xcopy trail_web\dist\* bundle\static\ /E /I
          dir bundle
          dir bundle\static

      - name: Create Windows Installer
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ($version -eq "") { $version = "${{ github.ref_name }}" }
          $version = $version -replace '^v', ''

          # jpackage 要求版本号不能以 0 开头，自动转换
          if ($version -match '^0\.') {
            $version = "1." + $version.Substring(2)
            Write-Host "Version adjusted to $version (jpackage requirement)"
          }

          jpackage `
            --name "Trail" `
            --app-version "$version" `
            --description "Trail 工作日志管理工具" `
            --vendor "Trail Team" `
            --type exe `
            --input bundle `
            --main-jar trail-api.jar `
            --java-options "-Xmx512m" `
            --java-options "-Dfile.encoding=UTF-8" `
            --win-console `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut `
            --dest output

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trail-windows
          path: output/*.exe

  # ============================================================
  # 构建 macOS 安装包
  # ============================================================
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Build Frontend
        run: |
          cd trail_web
          pnpm install
          pnpm build

      - name: Build Backend
        run: |
          cd trail_api
          mvn clean package -DskipTests

      - name: Prepare Bundle
        run: |
          mkdir -p bundle
          cp trail_api/target/trail-api.jar bundle/
          mkdir -p bundle/static
          cp -r trail_web/dist/* bundle/static/

      - name: Create macOS Installer
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ]; then version="${{ github.ref_name }}"; fi
          version="${version#v}"

          # jpackage 要求版本号不能以 0 开头，自动转换
          if [[ "$version" =~ ^0\. ]]; then
            version="1.${version:2}"
            echo "Version adjusted to $version (jpackage requirement)"
          fi

          jpackage \
            --name "Trail" \
            --app-version "$version" \
            --description "Trail 工作日志管理工具" \
            --vendor "Trail Team" \
            --type dmg \
            --input bundle \
            --main-jar trail-api.jar \
            --java-options "-Xmx512m" \
            --java-options "-Dfile.encoding=UTF-8" \
            --dest output

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trail-macos
          path: output/*.dmg

  # ============================================================
  # 构建跨平台 JAR 包（备选）
  # ============================================================
  build-jar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Build Frontend
        run: |
          cd trail_web
          pnpm install
          pnpm build

      - name: Build Backend
        run: |
          cd trail_api
          mvn clean package -DskipTests

      - name: Prepare Release Package
        run: |
          mkdir -p release
          cp trail_api/target/trail-api.jar release/
          mkdir -p release/static
          cp -r trail_web/dist/* release/static/

          # 创建启动脚本
          cat > release/run.sh << 'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          java -jar trail-api.jar
          EOF
          chmod +x release/run.sh

          # Windows 启动脚本
          cat > release/run.bat << 'EOF'
          @echo off
          cd /d "%~dp0"
          java -jar trail-api.jar
          pause
          EOF

          # README
          cat > release/README.txt << 'EOF'
          Trail 工作日志管理工具

          运行要求：
            Java 17 或更高版本

          启动方式：
            macOS/Linux: 双击 run.sh 或执行 sh run.sh
            Windows: 双击 run.bat

          安装 Java：
            macOS: brew install openjdk@17
            Windows: https://adoptium.net/
            Linux: sudo apt install openjdk-17-jdk

          访问地址：
            http://localhost:8765
          EOF

      - name: Create Archive
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ]; then version="${{ github.ref_name }}"; fi
          version="${version#v}"

          cd release
          zip -r ../trail-${version}-jar.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trail-jar
          path: trail-*-jar.zip

  # ============================================================
  # 发布 Release
  # ============================================================
  release:
    needs: [build-windows, build-macos, build-jar]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: trail-windows
          path: artifacts/windows

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: trail-macos
          path: artifacts/macos

      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: trail-jar
          path: artifacts/jar

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows/*.exe
            artifacts/macos/*.dmg
            artifacts/jar/*.zip
          body: |
            ## Trail v${{ github.ref_name }}

            ### 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows | `Trail-*.exe` | 安装包，无需安装 Java |
            | macOS | `Trail-*.dmg` | 安装包，无需安装 Java |
            | 跨平台 | `trail-*-jar.zip` | 需安装 Java 17 |

            ### 安装方式

            **Windows/macOS 安装包**：
            1. 双击安装
            2. 选择安装目录
            3. 从开始菜单/Dock 启动

            **跨平台 JAR 包**：
            1. 安装 Java 17：https://adoptium.net/
            2. 解压 zip 文件
            3. 运行 `run.sh` (macOS/Linux) 或 `run.bat` (Windows)

            ### 首次使用

            启动后访问 http://localhost:8765，按提示配置数据目录。